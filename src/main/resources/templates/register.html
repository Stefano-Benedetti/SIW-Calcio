<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>SIW Calcio</title>
</head>
<body>
<div>
    <h2>Registrazione</h2>

    <form th:action="@{/register}" method="post" th:object="${form}">
        <div th:if="${#fields.hasGlobalErrors()}">
            <p th:each="err : ${#fields.globalErrors()}" th:text="${err}">...</p>
        </div>
        <div>
            <label>Nome Utente:</label>
            <span><input type="text" th:field="${form.username}"></span>
            <span th:if="${#fields.hasErrors('username')}" th:errors="${form.username}"></span>
        </div>
        <div>
            <label>Password:</label>
            <span><input type="text" th:field="${form.password}"></span>
            <span th:if="${#fields.hasErrors('password')}" th:errors="${form.password}"></span>
        </div>

        <button type="submit">Conferma</button>

    </form>
</div>
</body>
</html>
