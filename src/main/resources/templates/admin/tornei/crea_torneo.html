<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aggiungi torneo - SIW Calcio</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/form.css}">
</head>

<body>
<header class="site-header">
    <div class="container header-content">
        <a href="/" class="logo">SIW Calcio</a>

        <nav class="main-nav">
            <a href="/tornei">Tornei</a>
            <a href="/squadre">Squadre</a>

            <div sec:authorize="isAnonymous()" class="nav-auth">
                <a href="/login">Login</a>
                <a href="/register" class="btn btn-small">Registrazione</a>
            </div>

            <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" class="logout-form">
                <button type="submit" class="btn btn-outline btn-small">Logout</button>
            </form>
        </nav>
    </div>
</header>

<main class="form-main">
    <section class="form-section">
        <div class="container">
            <div class="page-actions">
                <button type="button" class="back-link back-button" onclick="history.back()">← Torna indietro</button>
            </div>

            <div class="form-page-header">
                <span class="eyebrow">Area amministratore</span>
                <h1>Aggiungi un torneo</h1>
                <p>Inserisci i dati del nuovo torneo.</p>
            </div>

            <div class="form-card">
                <form th:action="@{/admin/tornei/crea}" method="POST" th:object="${torneo}" class="site-form">
                    <div th:if="${#fields.hasGlobalErrors()}" class="form-errors">
                        <p th:each="err : ${#fields.globalErrors()}" th:text="${err}">...</p>
                    </div>

                    <div class="form-group">
                        <label for="nome">Nome</label>
                        <input id="nome"
                               type="text"
                               th:field="${torneo.nome}">
                        <span th:if="${#fields.hasErrors('nome')}"
                              th:errors="${torneo.nome}"
                              class="field-error"></span>
                    </div>

                    <div class="form-group">
                        <label for="anno">Anno</label>
                        <input id="anno"
                               type="number"
                               min="2025"
                               step="1"
                               th:field="${torneo.anno}">
                        <span th:if="${#fields.hasErrors('anno')}"
                              th:errors="${torneo.anno}"
                              class="field-error"></span>
                    </div>

                    <div class="form-group">
                        <label for="descrizione">Descrizione</label>
                        <input id="descrizione"
                               type="text"
                               th:field="${torneo.descrizione}">
                        <span th:if="${#fields.hasErrors('descrizione')}"
                              th:errors="${torneo.descrizione}"
                              class="field-error"></span>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn">Conferma</button>
                        <button type="button" class="btn btn-secondary" onclick="history.back()">Annulla</button>
                    </div>
                </form>
            </div>
        </div>
    </section>
</main>

<footer class="site-footer">
    <div class="container">
        <p>SIW Calcio</p>
    </div>
</footer>
</body>
</html>
