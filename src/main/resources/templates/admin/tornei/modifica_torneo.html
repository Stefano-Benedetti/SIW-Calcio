<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>SIW Calcio</title>
</head>
<body>
    <p>
        <a th:href="@{/tornei/{id}(id=${id})}">Vai al torneo</a>
    </p>

    <h1>Modifica il torneo</h1>
    <form th:action="@{/admin/tornei/{id}/modifica(id=${id})}" method="POST" th:object="${torneo}">
        <div th:if="${#fields.hasGlobalErrors()}">
            <p th:each="err : ${#fields.globalErrors()}" th:text="${err}">...</p>
        </div>
        <p>
            <label>Nome:</label> <span><input type="text" th:field="${torneo.nome}"/></span>
            <span th:if="${#fields.hasErrors('nome')}" th:errors="${torneo.nome}"></span>
        </p>
        <p>
            <label>Anno:</label> <span><input type="number" th:field="${torneo.anno}"/></span>
            <span th:if="${#fields.hasErrors('anno')}" th:errors="${torneo.anno}"></span>
        </p>
        <p>
            <label>Descrizione:</label> <span><input type="text" th:field="${torneo.descrizione}"/></span>
            <span th:if="${#fields.hasErrors('descrizione')}" th:errors="${torneo.descrizione}"></span>
        </p>
        <p>
            <span><button type="submit">Conferma</button></span>
        </p>
    </form>
    <h1>Aggiungi un'iscrizione</h1>
    <form th:action="@{/admin/tornei/{id}/iscrivi(id=${id})}" method="POST" th:object="${nuovaSquadra}">
        <p>
            <label>Squadre:</label>
            <select th:field="${nuovaSquadra.squadraId}" name="nuovaSquadraId" size="1">
                <option value="">Seleziona una squadra</option>
                <option th:each="squadraNonIscritta : ${squadreNonIscritte}" th:value="${squadraNonIscritta.id}" th:text="${squadraNonIscritta.nome}"></option>
            </select>
            <span th:if="${#fields.hasErrors('squadraId')}" th:errors="${nuovaSquadra.squadraId}"></span>
        </p>
        <p>
            <span><button type="submit">Iscrivi</button></span>
        </p>
    </form>
    <h1>Rimuovi un'iscrizione</h1>
    <form th:action="@{/admin/tornei/{id}/disiscrivi(id=${id})}" method="POST" th:object="${squadra}">
        <p>
            <label>Iscrizioni:</label>
            <select th:field="${squadra.squadraId}" size="1">
                <option value="">Seleziona una squadra</option>
                <option th:each="squadraIscritta : ${squadreIscritte}" th:value="${squadraIscritta.squadra.id}" th:text="${squadraIscritta.squadra.nome}"></option>
            </select>
            <span th:if="${#fields.hasErrors('squadraId')}" th:errors="${squadra.squadraId}"></span>
        </p>
        ATTENZIONE: se disiscrivi una squadra da un torneo, tutte le partite e i punteggi di quella squadra saranno eliminati.
        <p>
            <span><button type="submit">Disiscrivi</button></span>
        </p>
    </form>
</body>
</html>
