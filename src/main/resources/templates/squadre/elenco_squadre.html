<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squadre - SIW Calcio</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/list.css}">
</head>

<body>
<header class="site-header">
    <div class="container header-content">
        <a href="/" class="logo">SIW Calcio</a>

        <nav class="main-nav">
            <a href="/tornei">Tornei</a>
            <a href="/squadre">Squadre</a>

            <div sec:authorize="isAnonymous()" class="nav-auth">
                <a href="/login">Login</a>
                <a href="/register" class="btn btn-small">Registrazione</a>
            </div>

            <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" class="logout-form">
                <button type="submit" class="btn btn-outline btn-small">Logout</button>
            </form>
        </nav>
    </div>
</header>

<main class="list-main">
    <section class="list-section">
        <div class="container">
            <div class="page-actions">
                <a href="/" class="back-link">← Vai alla home</a>
            </div>

            <div class="list-page-header">
                <div>
                    <span class="eyebrow">Squadre</span>
                    <h1>Squadre SIW Calcio</h1>
                    <p>Consulta le squadre registrate e scopri i giocatori che ne fanno parte.</p>
                </div>

                <a sec:authorize="hasAuthority('ADMIN')"
                   href="/admin/squadre/crea"
                   class="btn">
                    Crea squadra
                </a>
            </div>

            <div th:if="${squadre.isEmpty()}" class="empty-state">
                Non è stata registrata alcuna squadra.
            </div>

            <div th:unless="${squadre.isEmpty()}" class="list-card">
                <ul class="items-list">
                    <li th:each="squadra : ${squadre}">
                        <a th:href="|/squadre/${squadra.id}|"
                           class="item-link">
                            <span th:text="${squadra.nome}">nome</span>
                            <span class="item-arrow">→</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </section>
</main>

<footer class="site-footer">
    <div class="container">
        <p>SIW Calcio</p>
    </div>
</footer>
</body>
</html>
